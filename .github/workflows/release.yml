name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v0.1.0)'
        required: true
        default: ''

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Validate version format
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Fail the release early if the version is not valid.
          # The `v*.*.*` tag trigger can still match invalid values such as
          # `v1.2.3foo`, and Vault rejects a non-empty, invalid RunningVersion
          # at plugin registration. This pattern mirrors the Go-side check in
          # plugin.validateReportedVersion (semver with a leading 'v', optional
          # pre-release and build metadata).
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version '$VERSION'. Must be valid semver with a leading 'v', e.g. v0.1.0, v0.1.0-rc.1, or v0.1.0+meta."
            exit 1
          fi
          echo "Version '$VERSION' is valid."

      - name: Run tests
        run: make test
      
      - name: Build release binaries
        env:
          CGO_ENABLED: "0"
        run: |
          # Vault uses the self-reported plugin version (RunningVersion) to
          # populate the plugin catalog. The version was validated above as a
          # semver with a leading 'v', the format Vault requires.
          LDFLAGS="-X github.com/gitrgoliveira/vault-plugin-secrets-openai/plugin.ReportedVersion=${{ steps.version.outputs.version }}"

          # Build Linux amd64 binary
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="${LDFLAGS}" -o bin/vault-plugin-secrets-openai ./cmd/vault-plugin-secrets-openai
          cd bin && tar czf vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-linux-amd64.tar.gz vault-plugin-secrets-openai
          shasum -a 256 vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-linux-amd64.tar.gz > vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-linux-amd64.tar.gz.sha256
          cd ..

          # Build Linux arm64 binary
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="${LDFLAGS}" -o bin/vault-plugin-secrets-openai ./cmd/vault-plugin-secrets-openai
          cd bin && tar czf vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-linux-arm64.tar.gz vault-plugin-secrets-openai
          shasum -a 256 vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-linux-arm64.tar.gz > vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-linux-arm64.tar.gz.sha256
          cd ..
          
          # Build macOS Intel binary
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="${LDFLAGS}" -o bin/vault-plugin-secrets-openai ./cmd/vault-plugin-secrets-openai
          cd bin && tar czf vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz vault-plugin-secrets-openai
          shasum -a 256 vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz > vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz.sha256
          cd ..
          
          # Build macOS Apple Silicon binary
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="${LDFLAGS}" -o bin/vault-plugin-secrets-openai ./cmd/vault-plugin-secrets-openai
          cd bin && tar czf vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz vault-plugin-secrets-openai
          shasum -a 256 vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz > vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz.sha256

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            bin/vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
            bin/vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-linux-amd64.tar.gz.sha256
            bin/vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-linux-arm64.tar.gz
            bin/vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-linux-arm64.tar.gz.sha256
            bin/vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz
            bin/vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz.sha256
            bin/vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz
            bin/vault-plugin-secrets-openai-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz.sha256
