name: Build and Publish Docker image to GHCR

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=dev-$(git rev-parse --short HEAD)
          fi
          # Vault requires the self-reported plugin version to be valid semver
          # with a leading 'v'. This pattern matches plugin.validateReportedVersion
          # and release.yml (optional pre-release and build metadata). Only
          # reported_version is consumed downstream (as the REPORTED_VERSION
          # build arg); the image's own tags come from docker/metadata-action.
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "reported_version=$VERSION" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            # A release tag that isn't valid semver would publish an image that
            # self-reports as unversioned; fail loudly instead, mirroring release.yml.
            echo "::error::Invalid release tag '$VERSION'. Must be valid semver with a leading 'v', e.g. v0.1.0."
            exit 1
          else
            # Non-tag builds (branch/dispatch) are intentionally unversioned.
            echo "reported_version=" >> $GITHUB_OUTPUT
          fi
          echo "Version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Keep the manifest list clean (amd64 + arm64 only). Disabling the
          # default provenance attestation avoids an extra "unknown/unknown"
          # entry in the image index
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REPORTED_VERSION=${{ steps.version.outputs.reported_version }}

      - name: Logout from GHCR
        run: docker logout ghcr.io
